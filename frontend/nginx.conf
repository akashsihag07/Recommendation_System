# Serves the built React app. The try_files line is the important bit: this is a
# single-page app, so any path that isn't a real file should fall back to
# index.html and let React handle the routing.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
